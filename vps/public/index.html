<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Your Ai Music</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ============================================================
   DESIGN TOKENS — dark TMA theme
============================================================ */
:root {
  --bg:      #0b0f16;
  --bg2:     #0e131c;
  --card:    #141a25;
  --card2:   #1a2130;
  --border:  #222b3a;
  --border2: #2b3648;
  --text:    #e9edf3;
  --muted:   #8a94a6;
  --muted2:  #5b6675;
  --barbg:   rgba(14,19,28,.92);
  --seg-active: #323d52;
  --seg-active-tx: #ffffff;

  --accent:  #4da3ff;
  --accent2: #2f6fed;
  --accent-dim: rgba(77,163,255,.12);
  --accent-brd: rgba(77,163,255,.45);
  --accent-sh: rgba(47,111,237,.5);

  --green:   #2fd475;
  --green-dim: rgba(47,212,117,.10);
  --green-brd: rgba(47,212,117,.35);
  --amber:   #f5b544;
  --amber-dim: rgba(245,181,68,.10);
  --amber-brd: rgba(245,181,68,.4);
  --violet:  #8f7bff;
  --violet-dim: rgba(143,123,255,.10);
  --violet-brd: rgba(143,123,255,.4);
  --r: 14px;
}
body.light {
  --bg:      #eef2f8;
  --bg2:     #f4f7fb;
  --card:    #ffffff;
  --card2:   #eef2f8;
  --border:  #dfe6f0;
  --border2: #c9d4e3;
  --text:    #1b2431;
  --muted:   #5d6a7d;
  --muted2:  #97a3b6;
  --barbg:   rgba(255,255,255,.92);
  --seg-active: #ffffff;
  --seg-active-tx: #1b2431;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
html, body { background:var(--bg); color:var(--text); overscroll-behavior:none; }
body {
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;
  font-size:15px; line-height:1.45; user-select:none; -webkit-user-select:none;
  transition:background .25s, color .25s;
}
button { font:inherit; color:inherit; background:none; border:none; cursor:pointer; }
textarea, input {
  font:inherit; color:var(--text); font-size:16px;
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  width:100%; padding:12px 14px; outline:none; transition:border-color .15s;
  -webkit-user-select:text; user-select:text;
}
textarea:focus, input:focus { border-color:var(--accent-brd); }
textarea { resize:none; }
::placeholder { color:var(--muted2); }
.hidden { display:none !important; }
.app { max-width:430px; margin:0 auto; padding-bottom:150px; }

/* ============================================================
   TOP BAR
============================================================ */
.topbar {
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px 10px;
  background:var(--barbg); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.brand { display:flex; align-items:center; gap:9px; font-weight:800; font-size:16px; }
.brand-logo {
  width:28px; height:28px; border-radius:8px; flex:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center;
}
.brand-logo svg { width:15px; height:15px; fill:#fff; }
.brand small { display:block; font-size:11px; font-weight:500; color:var(--muted); line-height:1.2; }

.lang { display:flex; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:2px; }
.lang button { padding:4px 10px; border-radius:8px; font-size:12px; font-weight:700; color:var(--muted); transition:all .15s; }
.lang button.active { background:var(--seg-active); color:var(--seg-active-tx); }

/* ============================================================
   GENERIC
============================================================ */
.page { padding:14px 16px 0; }
.micro {
  font-size:11px; font-weight:700; letter-spacing:.09em; text-transform:uppercase;
  color:var(--muted2); margin:20px 2px 8px;
}
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:14px; }
.label { font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:8px; }

/* Compact balance row */
.balance-row {
  display:flex; align-items:center; gap:10px;
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:10px 14px; margin-top:12px;
}
.balance-row .ic {
  width:30px; height:30px; border-radius:8px; flex:none;
  background:var(--accent-dim); color:var(--accent);
  display:flex; align-items:center; justify-content:center;
}
.balance-row .ic svg { width:16px; height:16px; fill:currentColor; }
.balance-row .cap { font-size:13px; font-weight:600; color:var(--muted); }
.balance-row .val { font-size:19px; font-weight:800; color:var(--accent); }
.balance-row .plus {
  width:26px; height:26px; border-radius:8px; flex:none; margin-left:auto;
  background:var(--accent-dim); color:var(--accent); font-size:16px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
}

/* ============================================================
   CHIPS / SEGMENTED / TABS
============================================================ */
.chips { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.chip {
  background:var(--bg2); border:1px solid var(--border); border-radius:11px;
  padding:10px 4px; text-align:center; font-size:13px; font-weight:600; color:var(--muted);
  transition:all .15s;
}
.chip:active { transform:scale(.95); }
.chip.active { background:var(--accent-dim); border-color:var(--accent-brd); color:var(--accent); }
.chip .em { display:block; font-size:17px; margin-bottom:2px; filter:saturate(.85); }

.segmented { display:flex; background:var(--bg2); border:1px solid var(--border); border-radius:11px; padding:3px; gap:2px; }
.segmented button { flex:1; padding:9px 2px; border-radius:8px; font-size:12.5px; font-weight:700; color:var(--muted); transition:all .15s; }
.segmented button.active { background:var(--seg-active); color:var(--seg-active-tx); }

.tabs { display:flex; border-bottom:1px solid var(--border); margin:-4px -14px 14px; padding:0 14px; }
.tabs button {
  flex:1; padding:11px 4px 12px; font-size:14px; font-weight:700; color:var(--muted);
  border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s;
}
.tabs button.active { color:var(--text); border-color:var(--accent); }

.ai-hint {
  display:flex; gap:8px; align-items:center;
  background:var(--green-dim); border:1px solid var(--green-brd); border-radius:10px;
  color:var(--green); font-size:12.5px; font-weight:600; padding:9px 12px; margin-bottom:10px;
}
.link-btn { color:var(--accent); font-size:13px; font-weight:700; margin-top:8px; display:inline-flex; gap:6px; align-items:center; }
.link-btn:active { opacity:.6; }

/* ============================================================
   BUTTONS
============================================================ */
.btn {
  width:100%; border-radius:12px; padding:14px; font-size:15px; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform .12s, opacity .15s;
}
.btn:active { transform:scale(.98); }
.btn:disabled { opacity:.5; }
.btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 6px 22px -6px var(--accent-sh); }
.btn-outline { background:transparent; border:1px solid var(--border2); color:var(--text); }
.btn-ghost  { background:var(--card2); color:var(--text); }
.btn.sm { padding:10px; font-size:13.5px; border-radius:10px; }

.cta-wrap {
  position:fixed; left:0; right:0; bottom:calc(62px + env(safe-area-inset-bottom)); z-index:30;
  padding:14px 16px 10px;
  background:linear-gradient(180deg,transparent, var(--bg) 55%);
}
.cta-wrap .btn { max-width:398px; margin:0 auto; }

/* ============================================================
   SPINNER / SKELETON / PROGRESS
============================================================ */
.spinner {
  width:20px; height:20px; border-radius:50%;
  border:2.5px solid rgba(255,255,255,.25); border-top-color:#fff;
  animation:spin .7s linear infinite;
}
.spinner.blue { border-color:var(--accent-dim); border-top-color:var(--accent); }
@keyframes spin { to { transform:rotate(360deg); } }

.skeleton { position:relative; overflow:hidden; background:var(--card2); border-radius:7px; height:13px; }
.skeleton::after {
  content:''; position:absolute; inset:0; transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);
  animation:shimmer 1.3s infinite;
}
@keyframes shimmer { 100% { transform:translateX(100%); } }

.progress { background:var(--card2); border-radius:99px; height:6px; overflow:hidden; }
.progress i { display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .7s ease; }

.gen-wrap { text-align:center; padding:44px 0 30px; }
.gen-disc { position:relative; width:96px; height:96px; margin:0 auto 22px; }
.gen-disc .ring { position:absolute; inset:0; border-radius:50%; border:1.5px solid var(--accent-brd); animation:pulse 2s ease-out infinite; }
.gen-disc .ring:nth-child(2) { animation-delay:1s; }
@keyframes pulse { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(1.65);opacity:0} }
.gen-disc .disc {
  position:absolute; inset:0; border-radius:50%;
  background:radial-gradient(circle at 50% 50%, var(--accent2) 0 18%, #10151f 19% 55%, #1a2130 56% 100%);
  border:1px solid var(--border2);
  animation:spin 2.4s linear infinite;
}
.gen-status { font-size:13px; font-weight:700; color:var(--accent); margin-top:10px; min-height:19px; }

/* Player */
.player {
  display:flex; align-items:center; gap:12px;
  background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:12px;
}
.play-btn {
  width:46px; height:46px; border-radius:50%; flex:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-size:15px;
  display:flex; align-items:center; justify-content:center;
}
.play-btn:active { transform:scale(.92); }
.eq { display:flex; align-items:flex-end; height:24px; flex:none; }
.eq span { width:3px; margin:0 1.5px; border-radius:2px; background:var(--accent); animation:eq 1s ease-in-out infinite; }
.eq span:nth-child(2){animation-delay:.15s} .eq span:nth-child(3){animation-delay:.3s}
.eq span:nth-child(4){animation-delay:.45s} .eq span:nth-child(5){animation-delay:.6s}
@keyframes eq { 0%,100%{height:6px} 50%{height:20px} }
.eq.paused span { animation-play-state:paused; height:6px; }

/* ============================================================
   SHOP
============================================================ */
.packs { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.pack {
  background:var(--card); border:1px solid var(--border); border-radius:var(--r);
  padding:16px 12px 12px; text-align:center; position:relative; transition:transform .12s;
}
.pack:active { transform:scale(.96); }
.pack .num { font-size:30px; font-weight:800; letter-spacing:-.02em; line-height:1; }
.pack .cap { font-size:11.5px; color:var(--muted); margin-top:3px; }
.pack .nm  { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:8px; }
.pack .price {
  margin-top:11px; padding-top:10px; border-top:1px solid var(--border);
  display:flex; justify-content:space-between; font-size:12.5px; font-weight:700;
}
.pack .price .st { color:var(--amber); }
.pack .price .ua { color:var(--muted); }
.pack.c-blue  { border-color:var(--accent-brd); } .pack.c-blue .num { color:var(--accent); }
.pack.c-green { border-color:var(--green-brd); } .pack.c-green .num { color:var(--green); }
.pack.c-violet{ border-color:var(--violet-brd);} .pack.c-violet .num{ color:var(--violet); }
.pack.c-amber { border-color:var(--amber-brd); } .pack.c-amber .num { color:var(--amber); }
.badge {
  position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  font-size:10px; font-weight:800; letter-spacing:.05em; white-space:nowrap;
  padding:3px 10px; border-radius:99px; color:#0b0f16;
}
.badge.b-blue { background:var(--accent); } .badge.b-amber { background:var(--amber); }

.note {
  display:flex; gap:10px; align-items:center; margin-top:14px;
  background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px 14px;
  font-size:12px; color:var(--muted); line-height:1.45;
}

/* ============================================================
   PROFILE
============================================================ */
.user-card { display:flex; align-items:center; gap:12px; margin-top:14px; }
.avatar {
  width:52px; height:52px; border-radius:50%; flex:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; font-size:21px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
}
.avatar { overflow:hidden; }
.avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.user-card b { font-size:16.5px; font-weight:800; display:block; }
.user-card span { font-size:12.5px; color:var(--muted); }

.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:12px; text-align:center;
}
.stat .v { font-size:21px; font-weight:800; line-height:1.15; }
.stat .k { font-size:11px; color:var(--muted); margin-top:2px; }
.stat.s-green { border-color:var(--green-brd); } .stat.s-green .v { color:var(--green); }
.stat.s-blue  { border-color:var(--accent-brd); } .stat.s-blue .v { color:var(--accent); }

.money-card { background:var(--card); border:1px solid var(--green-brd); border-radius:var(--r); padding:14px; }
.money-card .sum { font-size:24px; font-weight:800; color:var(--green); }
.money-card .cap { font-size:12px; color:var(--muted); margin-bottom:12px; }
.money-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

.ref-link {
  display:flex; align-items:center; gap:8px;
  background:var(--bg2); border:1px dashed var(--border2); border-radius:11px;
  padding:10px 12px; margin:10px 0;
}
.ref-link code {
  flex:1; min-width:0; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  user-select:text; -webkit-user-select:text;
}
.icon-btn {
  width:32px; height:32px; border-radius:9px; flex:none;
  background:var(--accent-dim); color:var(--accent);
  display:flex; align-items:center; justify-content:center; font-size:14px;
}
.icon-btn:active { transform:scale(.9); }
.ref-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }

/* Songs */
.song {
  display:flex; align-items:center; gap:11px;
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:11px 12px; margin-bottom:8px;
}
.song .cover {
  width:40px; height:40px; border-radius:10px; flex:none; font-size:17px;
  background:var(--accent-dim); display:flex; align-items:center; justify-content:center;
}
.song .inf { flex:1; min-width:0; }
.song .inf b { display:block; font-size:13.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song .inf span { font-size:11.5px; color:var(--muted); }
.song .dl {
  width:34px; height:34px; border-radius:9px; flex:none;
  background:var(--green-dim); color:var(--green);
  display:flex; align-items:center; justify-content:center;
}
.song .dl:active { transform:scale(.9); }
.song .dl svg { width:16px; height:16px; fill:currentColor; }
.empty { text-align:center; color:var(--muted2); font-size:13px; padding:18px 10px; }

/* Settings */
.set-row { display:flex; align-items:center; justify-content:space-between; padding:4px 0; }
.set-row + .set-row { margin-top:12px; }
.set-row .t { font-size:14px; font-weight:600; }
.dots { display:flex; gap:9px; }
.dot { width:26px; height:26px; border-radius:50%; border:2px solid transparent; transition:all .15s; }
.dot.active { border-color:var(--text); transform:scale(1.15); }
.ava-opts { display:flex; flex-wrap:wrap; gap:8px; }
.ava-opt {
  width:42px; height:42px; border-radius:50%; overflow:hidden;
  background:var(--bg2); border:2px solid var(--border); font-size:19px;
  display:flex; align-items:center; justify-content:center; transition:all .15s;
}
.ava-opt.active { border-color:var(--accent); transform:scale(1.08); }
.ava-opt img { width:100%; height:100%; object-fit:cover; }

/* ============================================================
   BOTTOM NAV
============================================================ */
.nav {
  position:fixed; left:0; right:0; bottom:0; z-index:40;
  display:flex; justify-content:space-around;
  background:var(--barbg); backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
}
.nav button {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:10.5px; font-weight:700; color:var(--muted2); flex:1; max-width:110px;
  transition:color .15s;
}
.nav button svg { width:21px; height:21px; fill:currentColor; transition:transform .15s; }
.nav button.active { color:var(--accent); }
.nav button.active svg { transform:translateY(-1px) scale(1.08); }

/* ============================================================
   MODAL / TOAST
============================================================ */
.modal { position:fixed; inset:0; z-index:50; }
.backdrop { position:absolute; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(3px); animation:fade .2s; }
.sheet {
  position:absolute; left:0; right:0; bottom:0; max-width:430px; margin:0 auto;
  background:var(--card); border:1px solid var(--border); border-bottom:none;
  border-radius:20px 20px 0 0; padding:14px 16px calc(20px + env(safe-area-inset-bottom));
  animation:up .28s cubic-bezier(.2,.9,.3,1.05);
}
.grab { width:38px; height:4px; border-radius:99px; background:var(--border2); margin:0 auto 14px; }
@keyframes up { from{transform:translateY(60px);opacity:0} to{transform:none;opacity:1} }
@keyframes fade { from{opacity:0} to{opacity:1} }
.fade-in { animation:fadeUp .25s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.m-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.m-head h3 { font-size:17px; font-weight:800; }
.m-head p  { font-size:12.5px; color:var(--muted); margin-top:2px; }
.m-close { width:30px; height:30px; border-radius:50%; background:var(--card2); color:var(--muted); font-size:13px; font-weight:800; flex:none; }

.method {
  width:100%; display:flex; align-items:center; gap:12px; text-align:left;
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  padding:11px 12px; margin-bottom:9px; transition:all .13s;
}
.method:active { transform:scale(.98); border-color:var(--accent-brd); }
.m-ic { width:38px; height:38px; border-radius:10px; flex:none; display:flex; align-items:center; justify-content:center; font-size:18px; }
.method b { display:block; font-size:14.5px; font-weight:700; }
.method span { display:block; font-size:12px; color:var(--muted); }
.method .grow { flex:1; min-width:0; }
.chev { color:var(--muted2); font-size:17px; font-weight:700; }

.addr {
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px;
  padding:12px; word-break:break-all; margin-bottom:10px; user-select:text; -webkit-user-select:text;
}
.center-state { padding:34px 10px 26px; text-align:center; }
.ok-circle {
  width:58px; height:58px; border-radius:50%; margin:0 auto 14px;
  background:var(--green-dim); border:1px solid var(--green-brd);
  color:var(--green); font-size:24px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
}

.toast {
  position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:60;
  background:var(--card2); border:1px solid var(--border2); color:var(--text);
  font-size:13.5px; font-weight:600; padding:10px 16px; border-radius:12px;
  max-width:90vw; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.35);
  animation:toastIn .25s ease;
}
@keyframes toastIn { from{transform:translate(-50%,-14px);opacity:0} to{transform:translate(-50%,0);opacity:1} }
</style>
</head>
<body>
<div class="app">

  <!-- ============ TOP BAR ============ -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
      </div>
      <div>
        <span data-i18n="app_name">Your Ai Music</span>
        <small data-i18n="app_tag"></small>
      </div>
    </div>
    <div class="lang" id="langSwitch">
      <button data-lang="uk">UA</button>
      <button data-lang="ru">RU</button>
      <button data-lang="en">EN</button>
    </div>
  </div>

  <!-- ============ SCREEN: CONSTRUCTOR ============ -->
  <div id="screen-create" class="page">

'use strict';

/* ================= TELEGRAM ================= */
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const haptic = (s='light') => tg?.HapticFeedback?.impactOccurred?.(s);
const tgUser = tg?.initDataUnsafe?.user || null;

/* ================= SERVER API =================
   Фронтенд раздаётся тем же сервером, поэтому пути относительные.
   Если сервер недоступен (открыли файл локально) — работает демо-режим. */
let SERVER = false;
let serverRefLink = null;

async function api(path, body = {}) {
  try {
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg?.initData || '', ...body }),
    });
    return await r.json();
  } catch (e) { return null; }
}

function applyServer(d) {
  if (!d?.ok) return false;
  state.credits = d.credits;
  state.money = d.money;
  state.stars = d.stars;
  state.songs = d.songs || [];
  if (d.ref) state.refStats = d.ref;
  if (d.refLink) serverRefLink = d.refLink;
  if (typeof d.isAdmin === 'boolean') state.isAdmin = d.isAdmin;
  $('adminBtn').classList.toggle('hidden', !isAdmin());
  updateDynamic();
  renderSongs();
  return true;
}

async function serverSync() {
  const d = await api('/api/me');
  if (d?.ok) {
    SERVER = true;
    applyServer(d);
    $('refLink').textContent = getRefLink().replace('https://', '');
  }
}

function save() {

      lang:state.lang, credits:state.credits, money:state.money, stars:state.stars,
      songs:state.songs, refStats:state.refStats, theme:state.theme, accent:state.accent,

function plural(n) {
  const w = t('gen_word');
  if (state.lang === 'en') return n === 1 ? w[0] : w[1];
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return w[0];
  if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return w[1];
  return w[2];
}

/* ================= THEME / ACCENT ================= */
function hexRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function applyAccent() {
  const [a, b] = ACCENTS[state.accent] || ACCENTS.blue;
  const r = document.documentElement.style;
  r.setProperty('--accent', a);
  r.setProperty('--accent2', b);
  r.setProperty('--accent-dim', hexRgba(a, .12));
  r.setProperty('--accent-brd', hexRgba(a, .45));
  r.setProperty('--accent-sh', hexRgba(b, .5));
  renderAccentDots();
}
function applyTheme() {
  document.body.classList.toggle('light', state.theme === 'light');
  document.querySelectorAll('#themeSeg button').forEach(b => b.classList.toggle('active', b.dataset.theme === state.theme));
  const bg = state.theme === 'light' ? '#eef2f8' : '#0b0f16';
  tg?.setHeaderColor?.(bg); tg?.setBackgroundColor?.(bg);
}
function renderAccentDots() {
  $('accentDots').innerHTML = Object.entries(ACCENTS).map(([k, [a, b]]) => `
    <button class="dot ${state.accent === k ? 'active' : ''}" style="background:linear-gradient(135deg,${a},${b})" onclick="setAccent('${k}')"></button>
  `).join('');
}
function setAccent(k) { haptic(); state.accent = k; applyAccent(); save(); }

  const visible = songsExpanded ? state.songs : state.songs.slice(0, SONGS_PREVIEW);

  }
  $('songsList').innerHTML = html;
}

/* ================= SONG CREATION (simulated) ================= */
function getLyrics() {
  return state.lyricsTab === 'ai' ? $('lyricsAi').value.trim() : $('lyricsSelf').value.trim();
}

async function createSong() {
  if (state.trackGenerating) return;
  if (state.credits < 1) { toast(t('no_credits')); showScreen('shop'); return; }
  if (state.vocal !== 'inst' && !getLyrics()) { toast(t('err_no_lyrics')); return; }
  haptic('heavy');

  const topic = $('aiTopic').value.trim();
  const name = (state.lyricsTab === 'ai' && topic)
    ? topic.slice(0, 28) + (topic.length > 28 ? '…' : '')
    : `${t('res_track')} #${state.songs.length + 1}`;
  const lyrics = getLyrics();

  if (SERVER) {
    // кредит списывает сервер; он же сохраняет песню
    const d = await api('/api/song', { name, genre: state.genre, vocal: state.vocal, lyrics });
    if (!d?.ok) {
      if (d?.error === 'no_credits') { toast(t('no_credits')); showScreen('shop'); }
      else toast('Server error');
      return;
    }
    applyServer(d);
  } else {
    state.credits--;
    state.songs.unshift({
      name, genre: state.genre, vocal: state.vocal,
      date: new Date().toLocaleDateString(), lyrics,
    });
    save();
  }

  state.trackGenerating = true;
  updateDynamic();
  showScreen('generating');

  const steps = [
    { p:25, s:'gen_s1', d:1200 },
    { p:55, s:'gen_s2', d:2600 },
    { p:80, s:'gen_s3', d:4200 },
    { p:97, s:'gen_s4', d:5800 },
  ];
  $('genProgress').style.width = '5%';
  $('genStatus').textContent = t('gen_s1');
  steps.forEach(st => setTimeout(() => {
    if (!state.trackGenerating) return;
    $('genProgress').style.width = st.p + '%';
    $('genStatus').textContent = t(st.s);
  }, st.d));

  setTimeout(() => {
    state.trackGenerating = false;
    updateDynamic();
    renderSongs();
    showScreen('result');
    haptic('heavy');
  }, 7200);
}

function resetToCreate() { stopPlay(); showScreen('create'); }

/* ---- download (demo: lyrics as .txt; real backend would serve mp3) ---- */
function downloadSongAt(i) {
  haptic();
  const s = state.songs[i];
  if (!s) return;
  const blob = new Blob([s.name + '\n\n' + (s.lyrics || '')], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);

async function doWithdraw(method, network) {
  if (state.money < WD_MIN) { toast(t('not_enough_money')); return; }
  const details = $('wdDetails')?.value.trim() || '';
  if (details.length < 5) { toast(t('wd_details_err')); return; }
  haptic('medium');
  showPayLoading(t('wd_processing'));
  const amount = state.money;

  if (SERVER) {
    // сервер сам проверяет баланс и шлёт админу: id, юзернейм, сумма, сеть, реквизиты
    const d = await api('/api/withdraw', { method, network, details });
    if (d?.ok) { applyServer(d); wdDoneScreen(amount, method, network); }
    else { toast(d?.error === 'min' ? t('not_enough_money') : 'Server error'); closePay(); }
    return;
  }

  setTimeout(() => {
    state.money = 0;
    save();
    updateDynamic();
    wdDoneScreen(amount, method, network);
  }, 2000);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

  const imgOpt = peAvatar?.type === 'img'
    ? `<button class="ava-opt active"><img src="${peAvatar.value}"></button>` : '';
  $('avaOpts').innerHTML = imgOpt + AVA_EMOJIS.map(e => `
    <button class="ava-opt ${peAvatar?.type === 'emoji' && peAvatar.value === e ? 'active' : ''}" onclick="chooseAva('${e}')">${e}</button>
  `).join('');
}
function chooseAva(e) { haptic(); peAvatar = { type:'emoji', value:e }; renderAvaOpts(); }

function uploadAva(ev) {
  const file = ev.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { peAvatar = { type:'img', value: reader.result }; renderAvaOpts(); haptic('medium'); };
  reader.readAsDataURL(file);
}

  haptic('medium');

    : `<div class="empty">Пусто</div>`;

  $('admRecent').innerHTML = d.recent.length ? d.recent.map(u => admRow(
    `<span>${admName(u)} <span style="color:var(--muted2)">${u.id}</span></span>
     <span>${u.credits} ген · ${Math.round(u.money)}₴ · ⭐${u.stars}</span>`)).join('')
    : `<div class="empty">Пусто</div>`;
}

async function admSearch() {
  haptic();
  const q = $('admQ').value.trim();
  if (!q) return;
  const d = SERVER
    ? await api('/api/admin/search', { q })
    : { ok: true, user: ADMIN_MOCK.recent[0], spent: 150, songs: 1, ref: { invited: 2, buyers: 1, earned: 30 } };
  if (!d?.ok || !d.user) { $('admUser').innerHTML = `<div class="empty">Не найден</div>`; return; }
  const u = d.user;
  $('admUser').innerHTML = `
    <div style="font-size:13px;line-height:1.8;margin-top:12px">
      <b>${u.name || ''}</b> ${u.username ? '@' + u.username : ''} · <code>${u.id}</code><br>
      Кредиты: <b>${u.credits}</b> · Баланс: <b style="color:var(--green)">${Math.round(u.money)}₴</b> · ⭐${u.stars}<br>
      Потратил: <b style="color:var(--amber)">${Math.round(d.spent)}₴</b> · Песен: ${d.songs}<br>
      Рефералов: ${d.ref.invited} (купили: ${d.ref.buyers}, принёс: ${Math.round(d.ref.earned)}₴)
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <input id="admAmount" type="number" placeholder="кол-во" style="flex:1">
      <button class="btn btn-ghost sm" style="width:auto;padding:10px 14px" onclick="admGive(${u.id},'credits')">+ген</button>
      <button class="btn btn-ghost sm" style="width:auto;padding:10px 14px" onclick="admGive(${u.id},'money')">+грн</button>
    </div>`;
}

async function admGive(id, field) {
  const n = Number($('admAmount').value);
  if (!n) { toast('Введите число'); return; }
  haptic('medium');
  if (!SERVER) { toast('Демо: нужен сервер'); return; }
  const d = await api('/api/admin/give', { id, [field]: n });
  if (d?.ok) { toast('Начислено ✅'); admSearch(); } else toast('Ошибка');
}

async function admWdPaid(id) {
  haptic('medium');
  if (!SERVER) { toast('Демо: нужен сервер'); return; }
  const d = await api('/api/admin/wd_paid', { id });
  if (d?.ok) { toast('Отмечено ✅'); loadAdmin(); } else toast('Ошибка');
}

/* ================= TOAST ================= */
let toastTimer = null;
function toast(msg) {
  const box = $('toastBox');
  box.textContent = msg;
  box.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => box.classList.add('hidden'), 2600);
}

/* ================= INIT ================= */
load();

document.querySelectorAll('#langSwitch button').forEach(b =>
  b.addEventListener('click', () => { haptic(); state.lang = b.dataset.lang; applyLang(); save(); }));
document.querySelectorAll('#vocalSeg button').forEach(b =>
  b.addEventListener('click', () => setVocal(b.dataset.vocal)));
document.querySelectorAll('#lyricsTabs button').forEach(b =>
  b.addEventListener('click', () => setTab(b.dataset.tab)));
document.querySelectorAll('#themeSeg button').forEach(b =>
  b.addEventListener('click', () => { haptic(); state.theme = b.dataset.theme; applyTheme(); save(); }));

// profile identity
const uNameDefault = tgUser ? [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ') : 'Guest';
$('userTag').textContent = tgUser?.username ? '@' + tgUser.username : 'id' + userId;
$('refLink').textContent = getRefLink().replace('https://', '');
renderProfile();
$('adminBtn').classList.toggle('hidden', !isAdmin());

applyAccent();
applyTheme();
applyLang();
setVocal('male');
setTab('self');
showScreen('create');
serverSync();   // подтягиваем реальные балансы/песни с сервера, если он есть
</script>
